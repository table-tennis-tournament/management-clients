services:
  mariadb:
    image: mariadb:latest
    container_name: management-db
    ports:
      - "3307:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=management
      - MARIADB_USER=user
      - MARIADB_PASSWORD=password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - management-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: management-app
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/management
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.mariadb.jdbc.Driver
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - management-network

networks:
  management-network:
    driver: bridge
