spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    clean-disabled: false
  sql:
    init:
      mode: always
      schema-locations: []
      data-locations: classpath:data.sql

logging:
  level:
    org.flywaydb: DEBUG
