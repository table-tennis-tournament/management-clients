<div class="bracket">
  <div *ngFor="let stage of stages" class="stage">
    <h2 class="stage-title">{{ stage.name }}</h2>
    <ul class="match-list">
      <li *ngFor="let match of stage.matches" class="match-item">
        <div class="match-content">
          <div class="team">
            <span>{{ match.team1[0]?.firstName }} {{ match.team1[0]?.lastName }}</span>
            <span>{{ match.result | resultPipe: true }}</span>
          </div>
          <hr />
          <div class="team">
            <span>{{ match.team2[0]?.firstName }} {{ match.team2[0]?.lastName }}</span>
            <span>{{ match.result | resultPipe: false }}</span>
          </div>
        </div>
      </li>
    </ul>
  </div>
</div>
